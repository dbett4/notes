<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>d + bet - Variant C Private Ledger</title>
  <style>
    :root {
      --ink: #201c18;
      --paper: #f4efe5;
      --panel: #181613;
      --gold: #c7a45a;
      --bone: #fff9ee;
      --muted: #8a8175;
      --line: rgba(32, 28, 24, 0.16);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--ink);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      padding: 48px 0;
    }

    .poster {
      min-height: 620px;
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      background: var(--paper);
      border: 1px solid rgba(255, 249, 238, 0.18);
    }

    .dark {
      display: grid;
      align-content: space-between;
      padding: clamp(30px, 5vw, 58px);
      background: var(--panel);
      color: var(--bone);
    }

    .seal {
      width: 128px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid rgba(199, 164, 90, 0.62);
      transition: transform 160ms var(--ease-out), border-color 160ms ease;
    }

    .seal:hover { border-color: var(--gold); }
    .seal:active { transform: scale(0.97); }

    .seal svg { width: 80px; height: 80px; }

    .dark-copy {
      color: rgba(255, 249, 238, 0.66);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.7;
      max-width: 290px;
    }

    .light {
      display: grid;
      align-content: center;
      gap: 48px;
      padding: clamp(34px, 6vw, 76px);
    }

    .wordmark {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: clamp(12px, 2vw, 22px);
      font-size: clamp(58px, 9vw, 116px);
      line-height: 0.94;
      letter-spacing: 0;
      font-weight: 500;
    }

    .wordmark span:not(.plus) {
      font-feature-settings: "ss01";
    }

    .plus {
      color: var(--gold);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-weight: 520;
      transform: translateY(-0.05em);
    }

    .details {
      display: grid;
      gap: 16px;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .value {
      font-size: 16px;
      font-weight: 650;
      color: var(--ink);
    }

    @media (max-width: 760px) {
      .poster { grid-template-columns: 1fr; }
      .dark { gap: 56px; }
      .row { grid-template-columns: 1fr; gap: 6px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="poster" aria-label="d + bet logo concept: Private Ledger">
      <aside class="dark">
        <div class="seal" aria-label="d plus private ledger mark">
          <svg viewBox="0 0 100 100" role="img" aria-label="d plus ledger seal">
            <path d="M52 16v68H35c-18 0-29-12-29-29s11-29 29-29h17" fill="none" stroke="#fff9ee" stroke-width="8"/>
            <path d="M70 30v40M50 50h40" stroke="#c7a45a" stroke-width="7"/>
            <path d="M18 84h64" stroke="#c7a45a" stroke-width="2"/>
          </svg>
        </div>
        <p class="dark-copy">Private Ledger gives the brand a quieter premium feel: less app startup, more personal system with taste and restraint.</p>
      </aside>
      <div class="light">
        <div class="wordmark" aria-label="d plus bet wordmark">
          <span>d</span><span class="plus">+</span><span>bet</span>
        </div>
        <div class="details">
          <div class="row">
            <div class="label">direction</div>
            <div class="value">Premium editorial betting ledger</div>
          </div>
          <div class="row">
            <div class="label">best use</div>
            <div class="value">Reports, notes vault, private dashboard</div>
          </div>
          <div class="row">
            <div class="label">mood</div>
            <div class="value">Confident, mature, quietly obsessive</div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
