<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>d + bet - Variant B Market Pulse</title>
  <style>
    :root {
      --ink: #0d1321;
      --paper: #f6f2e8;
      --slate: #4e5a61;
      --olive: #5e6048;
      --muted: #696b73;
      --line: rgba(13, 19, 33, 0.12);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ede7da;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      padding: 48px 0;
    }

    .shell {
      min-height: 620px;
      padding: clamp(28px, 5vw, 60px);
      background: var(--paper);
      border: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 46px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .center {
      display: grid;
      place-items: center;
      gap: 36px;
      text-align: center;
    }

    .pulse-mark {
      width: clamp(156px, 22vw, 228px);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, transparent 0 43%, rgba(78, 90, 97, 0.12) 43% 44%, transparent 44%),
        linear-gradient(90deg, transparent 48%, rgba(13, 19, 33, 0.16) 48% 52%, transparent 52%),
        linear-gradient(0deg, transparent 48%, rgba(13, 19, 33, 0.16) 48% 52%, transparent 52%);
      border: 1px solid var(--line);
      transition: transform 160ms var(--ease-out);
    }

    .pulse-mark:active { transform: scale(0.97); }

    .pulse-mark svg { width: 70%; height: 70%; }

    .wordmark {
      display: inline-flex;
      align-items: baseline;
      gap: clamp(10px, 1.8vw, 20px);
      font-size: clamp(58px, 10vw, 126px);
      font-weight: 620;
      letter-spacing: 0;
      line-height: 0.92;
    }

    .plus {
      color: var(--slate);
      font-weight: 700;
      position: relative;
    }

    .plus::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0.03em;
      width: 0.72em;
      height: 2px;
      background: var(--olive);
      transform: translateX(-50%);
    }

    .bottom {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--line);
    }

    .cell {
      padding: 22px 20px 0;
      border-right: 1px solid var(--line);
    }

    .cell:last-child { border-right: 0; }

    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .value {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 680;
    }

    @media (max-width: 760px) {
      .top, .bottom { grid-template-columns: 1fr; }
      .top { display: grid; }
      .bottom { gap: 0; }
      .cell { border-right: 0; border-bottom: 1px solid var(--line); padding: 18px 0; }
      .cell:last-child { border-bottom: 0; }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-label="d + bet logo concept: Market Pulse">
      <header class="top">
        <span>personal betting edge</span>
        <span>no casino language</span>
      </header>
      <div class="center">
        <div class="pulse-mark" aria-label="probability grid plus mark">
          <svg viewBox="0 0 100 100" role="img" aria-label="d plus probability mark">
            <path d="M45 18v64H33c-16 0-26-10-26-26s10-26 26-26h12" fill="none" stroke="#0d1321" stroke-width="9" stroke-linecap="round"/>
            <path d="M67 29v42M46 50h42" stroke="#4e5a61" stroke-width="8" stroke-linecap="round"/>
            <path d="M16 72c15-2 25-10 34-20 9-10 17-16 34-18" fill="none" stroke="#5e6048" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="wordmark" aria-label="d plus bet wordmark">
          <span>d</span><span class="plus">+</span><span>bet</span>
        </div>
      </div>
      <footer class="bottom">
        <div class="cell">
          <div class="label">direction</div>
          <div class="value">Market signal system</div>
        </div>
        <div class="cell">
          <div class="label">best use</div>
          <div class="value">Analytics site, odds monitor</div>
        </div>
        <div class="cell">
          <div class="label">mood</div>
          <div class="value">Live, technical, alert</div>
        </div>
      </footer>
    </section>
  </main>
</body>
</html>
